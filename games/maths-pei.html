<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths – Jeu de pratique (PEI 3e année)</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #3b6fcf;
    --primary-light: #5b8dee;
    --accent: #ff6b35;
    --accent2: #ffa559;
    --green: #2d9d5e;
    --green-light: #d4f5e0;
    --red: #d94040;
    --red-light: #fde8e8;
    --text: #1e2a3a;
    --muted: #7a8599;
    --shadow: 0 4px 20px rgba(59,111,207,0.12);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 25%, rgba(59,111,207,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 75%, rgba(255,107,53,0.06) 0%, transparent 55%);
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 2px solid rgba(59,111,207,0.1);
    background: linear-gradient(135deg, rgba(59,111,207,0.05), rgba(255,107,53,0.03));
  }

  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1.5rem, 5vw, 2.3rem);
    color: var(--primary);
    font-weight: 700;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.3rem;
    font-weight: 600;
  }

  /* Category selection */
  #category-screen {
    max-width: 650px;
    margin: 2rem auto;
    padding: 0 1.2rem;
  }

  #category-screen h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem;
    color: var(--primary);
    text-align: center;
    margin-bottom: 1.2rem;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
  }

  .cat-btn {
    background: var(--card);
    border: 2.5px solid rgba(59,111,207,0.15);
    border-radius: var(--radius);
    padding: 1.3rem 1rem;
    cursor: pointer;
    text-align: center;
    transition: all .2s ease;
    box-shadow: var(--shadow);
    font-family: 'Nunito', sans-serif;
  }

  .cat-btn:hover {
    border-color: var(--primary);
    background: linear-gradient(135deg, #e8f0ff, #fff);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(59,111,207,0.18);
  }

  .cat-btn .icon { font-size: 2rem; display: block; margin-bottom: .4rem; }
  .cat-btn .label { font-weight: 800; color: var(--primary); font-size: 0.85rem; line-height: 1.3; }

  /* Game screen */
  #game-screen { display: none; max-width: 650px; margin: 0 auto; padding: 1.5rem 1.2rem 3rem; }

  .progress-bar-wrap {
    background: rgba(59,111,207,0.1);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 99px;
    transition: width .4s ease;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .hud .score { color: var(--accent); font-size: 1rem; }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 1.6rem 1.4rem 1.4rem;
    box-shadow: var(--shadow);
    border: 2px solid rgba(59,111,207,0.08);
    margin-bottom: 1rem;
    animation: fadeUp .35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-label {
    font-size: 0.8rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--primary-light);
    margin-bottom: .6rem;
  }

  .question-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }

  /* Answer input */
  .answer-input-wrap {
    display: flex;
    gap: .8rem;
    align-items: center;
  }

  .answer-input {
    flex: 1;
    padding: .85rem 1rem;
    border: 2.5px solid rgba(59,111,207,0.2);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .answer-input:focus { border-color: var(--primary); }
  .answer-input.correct { border-color: var(--green); background: var(--green-light); }
  .answer-input.wrong { border-color: var(--red); background: var(--red-light); }

  .submit-btn {
    padding: .85rem 1.5rem;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .18s;
    box-shadow: 0 4px 14px rgba(59,111,207,0.3);
  }

  .submit-btn:hover { background: var(--primary-light); transform: translateY(-2px); }
  .submit-btn:disabled { opacity: .4; cursor: default; transform: none; }

  /* Feedback & explanation */
  .feedback {
    min-height: 2rem;
    font-weight: 700;
    font-size: 1rem;
    text-align: center;
    margin: .8rem 0 .3rem;
    transition: all .2s;
  }

  .feedback.ok { color: var(--green); }
  .feedback.err { color: var(--red); }

  .explanation {
    display: none;
    background: #fff8f0;
    border: 2px solid var(--accent2);
    border-radius: 12px;
    padding: 1.2rem;
    margin-top: .8rem;
    font-size: 0.95rem;
    line-height: 1.6;
    animation: fadeUp .3s ease;
  }

  .explanation h4 {
    color: var(--accent);
    font-family: 'Fredoka', sans-serif;
    margin-bottom: .5rem;
    font-size: 1rem;
  }

  .explanation .step {
    margin: .4rem 0;
    padding: .3rem 0;
  }

  .explanation .highlight {
    background: #ffe8cc;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 700;
  }

  .explanation .number-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: .8rem 0;
    flex-wrap: wrap;
  }

  .explanation .nl-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 45px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
  }

  .explanation .nl-mark.active {
    color: var(--accent);
    font-size: 1rem;
  }

  .explanation .nl-mark.answer {
    color: var(--green);
    font-size: 1rem;
  }

  .explanation .nl-line {
    width: 30px;
    height: 3px;
    background: var(--muted);
    margin: 0 -2px;
    align-self: center;
  }

  .explanation .nl-tick {
    width: 2px;
    height: 12px;
    background: var(--muted);
    margin-bottom: 4px;
  }

  .explanation .nl-tick.tall {
    height: 20px;
    background: var(--primary);
    width: 3px;
  }

  .explanation .column-math {
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    background: #f8f9fc;
    border-radius: 10px;
    padding: 1rem;
    display: inline-block;
    line-height: 1.7;
    margin: .5rem 0;
    text-align: right;
    border: 1px solid #e0e4ee;
  }

  .explanation .column-math .carry {
    color: var(--accent);
    font-size: 0.8rem;
  }

  .explanation .column-math .result-line {
    border-top: 2.5px solid var(--text);
    padding-top: .3rem;
    margin-top: .1rem;
  }

  /* Nav */
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: .8rem;
  }

  .nav-btn {
    flex: 1;
    padding: .8rem 1rem;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all .18s ease;
  }

  #btn-next {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 14px rgba(59,111,207,0.3);
  }

  #btn-next:hover { background: var(--primary-light); transform: translateY(-2px); }
  #btn-next:disabled { opacity: .4; cursor: default; transform: none; }

  #btn-restart {
    background: transparent;
    color: var(--muted);
    border: 2px solid rgba(59,111,207,0.2);
  }

  #btn-restart:hover { border-color: var(--primary); color: var(--primary); }

  /* Results */
  #result-screen {
    display: none;
    max-width: 500px;
    margin: 3rem auto;
    padding: 0 1.2rem;
    text-align: center;
    animation: fadeUp .4s ease;
  }

  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow);
    border: 2px solid rgba(59,111,207,0.1);
  }

  .result-emoji { font-size: 3.5rem; display: block; margin-bottom: .8rem; }

  .result-card h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    color: var(--primary);
    margin-bottom: .4rem;
  }

  .result-card .big-score {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin: .6rem 0;
  }

  .result-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.3rem; }

  .result-btns { display: flex; flex-direction: column; gap: .7rem; }

  .result-btns button {
    padding: .85rem;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all .18s;
  }

  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-secondary { background: transparent; border: 2px solid rgba(59,111,207,0.25) !important; color: var(--muted); }
  .btn-secondary:hover { border-color: var(--primary) !important; color: var(--primary); }
</style>
</head>
<body>

<header>
  <h1>🔢 Maths – Pratique</h1>
  <p>Jeu de révision · Niveau 3e année</p>
</header>

<div id="category-screen">
  <h2>Choisis une section</h2>
  <div class="cat-grid">
    <button class="cat-btn" onclick="startGame('arrondir10')">
      <span class="icon">🎯</span>
      <span class="label">Arrondir à la dizaine</span>
    </button>
    <button class="cat-btn" onclick="startGame('arrondir100')">
      <span class="icon">🎯</span>
      <span class="label">Arrondir à la centaine</span>
    </button>
    <button class="cat-btn" onclick="startGame('addition')">
      <span class="icon">➕</span>
      <span class="label">Additions</span>
    </button>
    <button class="cat-btn" onclick="startGame('soustraction')">
      <span class="icon">➖</span>
      <span class="label">Soustractions</span>
    </button>
    <button class="cat-btn" onclick="startGame('problemes')">
      <span class="icon">🧩</span>
      <span class="label">Résolutions de problèmes</span>
    </button>
    <button class="cat-btn" onclick="startGame('all')">
      <span class="icon">🌟</span>
      <span class="label">Tout mélanger !</span>
    </button>
  </div>
</div>

<div id="game-screen">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div class="hud">
    <span id="q-counter">Question 1 / 10</span>
    <span class="score">⭐ <span id="score-display">0</span></span>
  </div>
  <div class="question-card">
    <div class="question-label" id="q-category">Arrondissement</div>
    <div class="question-text" id="q-text"></div>
    <div class="answer-input-wrap">
      <input type="text" class="answer-input" id="answer-input" placeholder="Ta réponse..." autocomplete="off">
      <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">OK</button>
    </div>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="explanation" id="explanation"></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-restart" onclick="goHome()">🏠 Accueil</button>
    <button class="nav-btn" id="btn-next" onclick="nextQuestion()" disabled>Question suivante →</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-card">
    <span class="result-emoji" id="result-emoji">🎉</span>
    <h2>Terminé !</h2>
    <div class="big-score" id="result-score"></div>
    <p id="result-msg"></p>
    <div class="result-btns">
      <button class="btn-primary" onclick="startGame(lastCategory)">🔄 Rejouer</button>
      <button class="btn-secondary" onclick="goHome()">🏠 Choisir une section</button>
    </div>
  </div>
</div>

<script>
// ─── Utilities ───
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ─── QUESTION GENERATORS ───

// Arrondir à la dizaine
function genArrondir10() {
  const n = randInt(11, 999);
  const answer = Math.round(n / 10) * 10;
  const lowerTen = Math.floor(n / 10) * 10;
  const upperTen = lowerTen + 10;
  const digit = n % 10;

  return {
    category: '🎯 Arrondir à la dizaine',
    text: `Arrondis ${n} à la dizaine près.`,
    correct: answer,
    explain: function() {
      const distLow = n - lowerTen;
      const distHigh = upperTen - n;
      let html = `<h4>💡 Comment arrondir ${n} à la dizaine ?</h4>`;
      html += `<div class="step">Le nombre <span class="highlight">${n}</span> se trouve entre <strong>${lowerTen}</strong> et <strong>${upperTen}</strong>.</div>`;
      html += `<div class="step">On regarde le chiffre des unités : <span class="highlight">${digit}</span></div>`;
      if (digit < 5) {
        html += `<div class="step">${digit} est plus petit que 5, donc on arrondit vers le bas → <span class="highlight">${answer}</span></div>`;
      } else if (digit === 5) {
        html += `<div class="step">${digit} est égal à 5, donc on arrondit vers le haut → <span class="highlight">${answer}</span></div>`;
      } else {
        html += `<div class="step">${digit} est plus grand que 5, donc on arrondit vers le haut → <span class="highlight">${answer}</span></div>`;
      }
      // Visual number line
      html += `<div class="number-line">`;
      html += `<div class="nl-mark"><div class="nl-tick tall"></div>${lowerTen}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark active"><div class="nl-tick"></div>${n}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark"><div class="nl-tick tall"></div>${upperTen}</div>`;
      html += `</div>`;
      html += `<div class="step" style="text-align:center;margin-top:.5rem">La bonne réponse est <span class="highlight">${answer}</span></div>`;
      return html;
    }
  };
}

// Arrondir à la centaine
function genArrondir100() {
  const n = randInt(51, 999);
  const answer = Math.round(n / 100) * 100;
  const lowerHun = Math.floor(n / 100) * 100;
  const upperHun = lowerHun + 100;
  const tens = Math.floor((n % 100) / 10);
  const tensDigit = Math.floor(n / 10) % 10;

  return {
    category: '🎯 Arrondir à la centaine',
    text: `Arrondis ${n} à la centaine près.`,
    correct: answer,
    explain: function() {
      const digitCheck = Math.floor((n % 100) / 10);
      const onesAndTens = n % 100;
      let html = `<h4>💡 Comment arrondir ${n} à la centaine ?</h4>`;
      html += `<div class="step">Le nombre <span class="highlight">${n}</span> se trouve entre <strong>${lowerHun}</strong> et <strong>${upperHun}</strong>.</div>`;
      html += `<div class="step">On regarde le chiffre des dizaines : <span class="highlight">${tensDigit}</span></div>`;
      if (onesAndTens < 50) {
        html += `<div class="step">${tensDigit} est plus petit que 5, donc on arrondit vers le bas → <span class="highlight">${answer}</span></div>`;
      } else if (onesAndTens === 50) {
        html += `<div class="step">${tensDigit} est égal à 5, donc on arrondit vers le haut → <span class="highlight">${answer}</span></div>`;
      } else {
        html += `<div class="step">${tensDigit} est plus grand ou égal à 5, donc on arrondit vers le haut → <span class="highlight">${answer}</span></div>`;
      }
      html += `<div class="number-line">`;
      html += `<div class="nl-mark"><div class="nl-tick tall"></div>${lowerHun}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark active"><div class="nl-tick"></div>${n}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark"><div class="nl-tick tall"></div>${upperHun}</div>`;
      html += `</div>`;
      html += `<div class="step" style="text-align:center;margin-top:.5rem">La bonne réponse est <span class="highlight">${answer}</span></div>`;
      return html;
    }
  };
}

// Addition (sum ≤ 1000)
function genAddition() {
  const a = randInt(10, 500);
  const b = randInt(10, 999 - a);
  const answer = a + b;

  return {
    category: '➕ Addition',
    text: `Combien font ${a} + ${b} ?`,
    correct: answer,
    explain: function() {
      const aStr = String(a).padStart(3, ' ');
      const bStr = String(b).padStart(3, ' ');
      const rStr = String(answer).padStart(4, ' ');

      let html = `<h4>💡 Comment calculer ${a} + ${b} ?</h4>`;
      html += `<div class="step">On place les nombres en colonnes :</div>`;
      html += `<div class="column-math">`;
      html += `&nbsp;&nbsp;${aStr}<br>`;
      html += `+ ${bStr}<br>`;
      html += `<div class="result-line">${rStr}</div>`;
      html += `</div>`;

      // Decomposition
      const aU = a % 10, aD = Math.floor(a / 10) % 10, aC = Math.floor(a / 100);
      const bU = b % 10, bD = Math.floor(b / 10) % 10, bC = Math.floor(b / 100);
      html += `<div class="step">Unités : ${aU} + ${bU} = ${aU + bU}</div>`;
      html += `<div class="step">Dizaines : ${aD} + ${bD} = ${aD + bD}</div>`;
      if (aC > 0 || bC > 0) {
        html += `<div class="step">Centaines : ${aC} + ${bC} = ${aC + bC}</div>`;
      }
      html += `<div class="step" style="text-align:center;margin-top:.5rem">La bonne réponse est <span class="highlight">${answer}</span></div>`;
      return html;
    }
  };
}

// Soustraction (numbers ≤ 1000, result ≥ 0)
function genSoustraction() {
  let a = randInt(50, 999);
  let b = randInt(10, a - 1);
  // Make sure a > b
  if (b > a) [a, b] = [b, a];
  const answer = a - b;

  return {
    category: '➖ Soustraction',
    text: `Combien font ${a} − ${b} ?`,
    correct: answer,
    explain: function() {
      const aStr = String(a).padStart(3, ' ');
      const bStr = String(b).padStart(3, ' ');
      const rStr = String(answer).padStart(3, ' ');

      let html = `<h4>💡 Comment calculer ${a} − ${b} ?</h4>`;
      html += `<div class="step">On place les nombres en colonnes :</div>`;
      html += `<div class="column-math">`;
      html += `&nbsp;&nbsp;${aStr}<br>`;
      html += `− ${bStr}<br>`;
      html += `<div class="result-line">&nbsp;${rStr}</div>`;
      html += `</div>`;

      // Number line approach
      html += `<div class="step">On peut aussi compter sur la droite numérique :</div>`;
      html += `<div class="number-line">`;
      html += `<div class="nl-mark answer"><div class="nl-tick tall"></div>${answer}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark"><div class="nl-tick"></div>+ ${b}</div>`;
      html += `<div class="nl-line"></div>`;
      html += `<div class="nl-mark active"><div class="nl-tick tall"></div>${a}</div>`;
      html += `</div>`;
      html += `<div class="step" style="text-align:center;margin-top:.5rem">La bonne réponse est <span class="highlight">${answer}</span></div>`;
      return html;
    }
  };
}

// Résolutions de problèmes — large bank of 30 templates
const PROBLEMES_TEMPLATES = [
  // Addition - vie quotidienne
  (a, b) => ({ text: `Léa a ${a} autocollants. Son ami lui donne ${b} autocollants de plus. Combien d'autocollants Léa a-t-elle maintenant ?`, correct: a + b, op: 'addition', equation: `${a} + ${b} = ${a + b}` }),
  (a, b) => ({ text: `Il y a ${a} élèves dans la classe de Mme Dupont et ${b} élèves dans la classe de M. Tremblay. Combien d'élèves y a-t-il en tout ?`, correct: a + b, op: 'addition', equation: `${a} + ${b} = ${a + b}` }),
  (a, b) => ({ text: `Le matin, ${a} oiseaux sont sur un arbre. L'après-midi, ${b} autres oiseaux arrivent. Combien d'oiseaux y a-t-il sur l'arbre maintenant ?`, correct: a + b, op: 'addition', equation: `${a} + ${b} = ${a + b}` }),

function genProbleme() {
  const a = randInt(20, 400);
  const b = randInt(20, 400);
  const template = PROBLEMES_TEMPLATES[Math.floor(Math.random() * PROBLEMES_TEMPLATES.length)];
  const prob = template(a, b);

  // Ensure answer ≤ 1000
  if (prob.correct > 1000) return genProbleme();

  return {
    category: '🧩 Résolution de problème',
    text: prob.text,
    correct: prob.correct,
    explain: function() {
      let html = `<h4>💡 Comment résoudre ce problème ?</h4>`;
      html += `<div class="step">L'opération à faire est une <strong>${prob.op}</strong>.</div>`;
      html += `<div class="step">L'équation : <span class="highlight">${prob.equation}</span></div>`;
      html += `<div class="step" style="text-align:center;margin-top:.5rem">La bonne réponse est <span class="highlight">${prob.correct}</span></div>`;
      return html;
    }
  };
}

// ─── GAME STATE ───
let questions = [], current = 0, score = 0, answered = false, lastCategory = 'all';

function generateQuestions(type, count) {
  const qs = [];
  for (let i = 0; i < count; i++) {
    if (type === 'arrondir10') qs.push(genArrondir10());
    else if (type === 'arrondir100') qs.push(genArrondir100());
    else if (type === 'addition') qs.push(genAddition());
    else if (type === 'soustraction') qs.push(genSoustraction());
    else if (type === 'problemes') qs.push(genProbleme());
  }
  return qs;
}

function startGame(cat) {
  lastCategory = cat;
  current = 0; score = 0; answered = false;

  if (cat === 'all') {
    // Generate big banks, pick a subset from each, then shuffle together
    questions = shuffle([
      ...shuffle(generateQuestions('arrondir10', 100)).slice(0, 8),
      ...shuffle(generateQuestions('arrondir100', 100)).slice(0, 8),
      ...shuffle(generateQuestions('addition', 100)).slice(0, 8),
      ...shuffle(generateQuestions('soustraction', 100)).slice(0, 8),
      ...shuffle(generateQuestions('problemes', 100)).slice(0, 8),
    ]);
  } else {
    // Generate a bank of 100 questions, pick 20 at random
    questions = shuffle(generateQuestions(cat, 100)).slice(0, 20);
  }

  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('q-counter').textContent = `Question ${current + 1} / ${total}`;
  document.getElementById('score-display').textContent = score;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('btn-next').disabled = true;

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.focus();

  document.getElementById('submit-btn').disabled = false;
}

function checkAnswer() {
  if (answered) return;

  const input = document.getElementById('answer-input');
  const userAnswer = input.value.trim();

  if (userAnswer === '') return;

  answered = true;
  input.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  const q = questions[current];
  const correct = q.correct;
  const userNum = parseInt(userAnswer, 10);

  const fb = document.getElementById('feedback');

  if (userNum === correct) {
    score++;
    input.className = 'answer-input correct';
    fb.textContent = '✅ Bravo ! Bonne réponse !';
    fb.className = 'feedback ok';
  } else {
    input.className = 'answer-input wrong';
    fb.textContent = `❌ Ce n'est pas la bonne réponse.`;
    fb.className = 'feedback err';

    // Show explanation
    const explDiv = document.getElementById('explanation');
    explDiv.innerHTML = q.explain();
    explDiv.style.display = 'block';
  }

  document.getElementById('score-display').textContent = score;
  document.getElementById('btn-next').disabled = false;

  const isLast = current === questions.length - 1;
  document.getElementById('btn-next').textContent = isLast ? 'Voir les résultats 🎉' : 'Question suivante →';
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (!answered) {
      checkAnswer();
    } else if (!document.getElementById('btn-next').disabled) {
      nextQuestion();
    }
  }
});

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('game-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('result-score').textContent = `${score} / ${total}`;

  let emoji, msg;
  if (pct === 100) { emoji = '🏆'; msg = 'Score parfait ! Tu es une superstar des maths ! 🌟'; }
  else if (pct >= 80) { emoji = '🌟'; msg = 'Excellent travail ! Continue comme ça !'; }
  else if (pct >= 60) { emoji = '😊'; msg = 'Bon travail ! Encore un peu de pratique !'; }
  else if (pct >= 40) { emoji = '💪'; msg = 'Continue à pratiquer, tu vas y arriver !'; }
  else { emoji = '📚'; msg = 'Pas de souci ! La pratique rend parfait ! Réessaie !'; }

  document.getElementById('result-emoji').textContent = emoji;
  try{window.parent.postMessage({type:'gameScore',score:score,total:total,pct:pct},'*');}catch(e){}
  document.getElementById('result-msg').textContent = msg;
}

function goHome() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('category-screen').style.display = 'block';
}
