// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, Math.min(n, arr.length));
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// APP STATE
// ═══════════════════════════════════════════
let state = {
  screen: "home",
  selectedSection: null,
  questions: [],
  currentQ: 0,
  score: 0,
  results: [],
  streak: 0,
  bestStreak: 0,
  answered: false,
  // Sort question state
  sortShuffled: [],
  sortPlaced: {},
  sortCurrentIdx: 0,
  sortDone: false,
};

const app = document.getElementById('app');

function typeLabel(t) {
  return { mcq:"Choix multiples", truefalse:"Vrai ou Faux", sort:"Classement", intrus:"Trouve l'intrus" }[t] || "";
}
function typeColor(t) {
  return { mcq:"#6C5CE7", truefalse:"#00B894", sort:"#E17055", intrus:"#0984E3" }[t] || "#666";
}

function startQuiz(sectionId) {
  const pool = sectionId === "all" ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.section === sectionId);
  state.questions = pickRandom(pool, 20);
  state.currentQ = 0;
  state.score = 0;
  state.results = [];
  state.streak = 0;
  state.bestStreak = 0;
  state.selectedSection = sectionId;
  state.answered = false;
  state.screen = "quiz";
  initSortState();
  render();
}

function initSortState() {
  const q = state.questions[state.currentQ];
  if (q && q.type === "sort") {
    state.sortShuffled = shuffle(q.items);
    state.sortPlaced = {};
    state.sortCurrentIdx = 0;
    state.sortDone = false;
  }
}

function handleAnswer(correct) {
  if (state.answered) return;
  state.answered = true;
  state.score = correct ? state.score + 1 : state.score;
  state.streak = correct ? state.streak + 1 : 0;
  state.bestStreak = Math.max(state.bestStreak, state.streak);
  state.results.push({ correct, question: state.questions[state.currentQ].q });

  setTimeout(() => {
    if (state.currentQ + 1 >= state.questions.length) {
      state.screen = "results";
    } else {
      state.currentQ++;
      state.answered = false;
      initSortState();
    }
    render();
  }, 1200);
}

function getEmoji() {
  const pct = state.score / state.questions.length;
  if (pct >= 0.9) return "🏆";
  if (pct >= 0.7) return "⭐";
  if (pct >= 0.5) return "👍";
  return "💪";
}

function getMessage() {
  const pct = state.score / state.questions.length;
  if (pct >= 0.9) return "Incroyable ! Tu es un expert de l'énergie !";
  if (pct >= 0.7) return "Bravo ! Tu connais bien l'énergie !";
  if (pct >= 0.5) return "Bon travail ! Continue à apprendre !";
  return "Continue ! Tu vas t'améliorer !";
}

function handleTF(selected, answer) {

  }
  document.getElementById('tf-true').disabled = true;
  document.getElementById('tf-false').disabled = true;
  handleAnswer(correct);
}

function renderSort(q) {
  const items = state.sortShuffled;
  const placed = state.sortPlaced;
  const currentIdx = state.sortCurrentIdx;
  const done = state.sortDone;
  const currentItem = !done ? items[currentIdx] : null;

  let html = `<div style="display:flex;flex-direction:column;gap:14px">
    <p style="font-size:19px;font-weight:700;line-height:1.5;color:#2D3436">${escapeHTML(q.q)}</p>`;

  if (!done && currentItem) {
    html += `<div style="text-align:center;padding:14px 16px;background:#FFFBEB;border-radius:14px;border:2px dashed #F6AD55;font-size:20px;font-weight:700;font-family:'Nunito',sans-serif;animation:slideUp 0.3s ease">
      👉 ${escapeHTML(currentItem.text)}
    </div>`;
  }

  html += `<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">`;
  q.categories.forEach(cat => {
    const itemsInCat = items.filter((_, i) => placed[i] === cat);
    html += `<div style="flex:1;min-width:130px">
      <button class="sort-cat-btn" onclick="handleSortPlace('${cat.replace(/'/g, "\\'")}')" ${done ? 'disabled' : ''}>${escapeHTML(cat)}</button>
      <div style="margin-top:6px;min-height:30px">`;
    itemsInCat.forEach(it => {
      const idx = items.indexOf(it);
      const correct = it.cat === placed[idx];
      html += `<div style="padding:4px 8px;border-radius:8px;font-size:13px;margin-bottom:3px;background:${done ? (correct ? '#C6F6D5' : '#FED7D7') : '#EDF2F7'};font-weight:600">
        ${escapeHTML(it.text)} ${done ? (correct ? '✅' : '❌') : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;

  if (!done) {
    html += `<div style="text-align:center;font-size:13px;color:#A0AEC0">${currentIdx + 1} / ${items.length}</div>`;
  }
  if (done) {
    const allCorrect = items.every((it, i) => placed[i] === it.cat);
    html += `<div style="text-align:center;font-size:16px;font-weight:700;color:${allCorrect ? '#38A169' : '#E53E3E'};padding:8px;border-radius:10px;background:${allCorrect ? '#F0FFF4' : '#FFF5F5'}">
      ${allCorrect ? '🎉 Tout est bien classé !' : 'Oups ! Regarde les corrections.'}
    </div>`;
  }

  html += `</div>`;
  return html;
}

function handleSortPlace(cat) {
  if (state.sortDone || state.answered) return;
  state.sortPlaced[state.sortCurrentIdx] = cat;
  const nextIdx = state.sortCurrentIdx + 1;

  if (nextIdx >= state.sortShuffled.length) {
    state.sortDone = true;
    const allCorrect = state.sortShuffled.every((it, i) => state.sortPlaced[i] === it.cat);
    render();
    setTimeout(() => handleAnswer(allCorrect), 1800);
  } else {
    state.sortCurrentIdx = nextIdx;
    render();
  }
}

        </div>

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="action-btn" onclick="startQuiz('${state.selectedSection}')" style="background:#6C5CE7;color:white">🔄 Rejouer</button>
          <button class="action-btn" onclick="state.screen='home';render()" style="background:#EDF2F7;color:#2D3436">🏠 Accueil</button>
        </div>
      </div>
    </div>
  `;
}

function render() {
  switch (state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'quiz': app.innerHTML = renderQuiz(); break;
    case 'results': app.innerHTML = renderResults(); break;
  }
}

// ═══════════════════════════════════════════
// SCORE REPORTING (for parent site hub)
// ═══════════════════════════════════════════
// When quiz ends and results screen shows, report score to parent
const _origRenderResults = renderResults;
renderResults = function() {
  const html = _origRenderResults();
  // Report score to parent hub
  try {
    const pct = Math.round((state.score / state.questions.length) * 100);
    window.parent.postMessage({
      type: 'gameScore',
      score: state.score,
      total: state.questions.length,
      pct: pct
    }, '*');
  } catch(e) {}
  return html;
};

// Start the app!
render();
</script>
</body>
</html>
