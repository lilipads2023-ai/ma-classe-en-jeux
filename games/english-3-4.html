<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Practice – Grades 3 & 4</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0ff;--card:#fff;--primary:#6c3fc5;--pl:#8b5cf6;--accent:#e85d75;--a2:#f59e6c;--green:#22c55e;--gl:#dcfce7;--red:#ef4444;--rl:#fde8e8;--text:#1e1b2e;--muted:#7c7a8a;--shadow:0 4px 20px rgba(108,63,197,.12);--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 10% 20%,rgba(108,63,197,.06) 0%,transparent 55%),radial-gradient(ellipse at 90% 80%,rgba(232,93,117,.05) 0%,transparent 55%)}
header{text-align:center;padding:2rem 1rem 1rem;border-bottom:2px solid rgba(108,63,197,.1);background:linear-gradient(135deg,rgba(108,63,197,.05),rgba(232,93,117,.03))}
header h1{font-family:'Baloo 2',cursive;font-size:clamp(1.5rem,5vw,2.3rem);color:var(--primary);font-weight:800}
header p{color:var(--muted);font-size:.9rem;margin-top:.2rem;font-weight:600}
.screen{max-width:700px;margin:2rem auto;padding:0 1.2rem}
.screen h2{font-family:'Baloo 2',cursive;font-size:1.3rem;color:var(--primary);text-align:center;margin-bottom:1.2rem}
.level-grid{display:grid;gap:1rem}
.level-btn{background:var(--card);border:2.5px solid rgba(108,63,197,.15);border-radius:var(--r);padding:1.3rem 1.2rem;cursor:pointer;text-align:left;transition:all .2s;box-shadow:var(--shadow);font-family:'Nunito',sans-serif}
.level-btn:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 28px rgba(108,63,197,.18)}
.level-btn .li{font-size:1.8rem;float:left;margin-right:1rem}
.level-btn .lt{font-weight:800;color:var(--primary);font-size:1.05rem}
.level-btn .ld{color:var(--muted);font-size:.82rem;margin-top:.2rem;line-height:1.4}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.9rem}
.cat-btn{background:var(--card);border:2.5px solid rgba(108,63,197,.15);border-radius:var(--r);padding:1.1rem .7rem;cursor:pointer;text-align:center;transition:all .2s;box-shadow:var(--shadow);font-family:'Nunito',sans-serif}
.cat-btn:hover{border-color:var(--primary);transform:translateY(-3px)}
.cat-btn .icon{font-size:1.6rem;display:block;margin-bottom:.2rem}
.cat-btn .label{font-weight:800;color:var(--primary);font-size:.78rem;line-height:1.3}
#game-screen{display:none;max-width:700px;margin:0 auto;padding:1.5rem 1.2rem 3rem}
.pbar{background:rgba(108,63,197,.1);border-radius:99px;height:8px;margin-bottom:1rem;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--pl));border-radius:99px;transition:width .4s}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;font-weight:700;font-size:.88rem;color:var(--muted)}
.hud .sc{color:var(--accent);font-size:1rem}
.qcard{background:var(--card);border-radius:var(--r);padding:1.5rem 1.3rem;box-shadow:var(--shadow);border:2px solid rgba(108,63,197,.08);margin-bottom:1rem;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.qlbl{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--pl);margin-bottom:.5rem}
.qtxt{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:.4rem;line-height:1.5}
.qhint{font-size:.83rem;color:var(--muted);font-style:italic;margin-bottom:1rem}
.passage{background:#faf8ff;border:1.5px solid rgba(108,63,197,.12);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1rem;font-size:.9rem;line-height:1.75;color:var(--text);max-height:350px;overflow-y:auto;white-space:pre-wrap}
.awrap{display:flex;gap:.8rem;align-items:flex-start}
.ainput{flex:1;padding:.8rem 1rem;border:2.5px solid rgba(108,63,197,.2);border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);outline:none;transition:border-color .2s}
.ainput:focus{border-color:var(--primary)}
.ainput.ok{border-color:var(--green);background:var(--gl)}
.ainput.err{border-color:var(--red);background:var(--rl)}
textarea.ainput{min-height:110px;resize:vertical;line-height:1.6}
textarea.ainput.lg{min-height:160px}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.mc-btn{background:#f4f4fb;border:2.5px solid rgba(108,63,197,.14);border-radius:12px;padding:.8rem 1rem;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:center}
.mc-btn:hover:not(:disabled){background:#e8e0ff;border-color:var(--primary);transform:translateY(-2px)}
.mc-btn.ok{background:var(--gl);border-color:var(--green);color:var(--green)}
.mc-btn.err{background:var(--rl);border-color:var(--red);color:var(--red)}
.mc-btn:disabled{cursor:default}
.sbtn{padding:.8rem 1.5rem;border-radius:12px;border:none;background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .18s;box-shadow:0 4px 14px rgba(108,63,197,.3)}
.sbtn:hover{background:var(--pl);transform:translateY(-2px)}
.sbtn:disabled{opacity:.4;cursor:default;transform:none}
.fb{min-height:2rem;font-weight:700;font-size:1rem;text-align:center;margin:.6rem 0 .2rem}
.fb.ok{color:var(--green)}.fb.err{color:var(--red)}.fb.rev{color:var(--a2)}
.corr{display:none;background:#fff5f0;border:2px solid var(--a2);border-radius:12px;padding:1rem;margin-top:.5rem;font-size:.9rem;animation:fu .3s;line-height:1.5}
.corr strong{color:var(--accent)}
.tnote{margin-top:.6rem;padding:.6rem;background:#f5f0ff;border-radius:8px;font-size:.83rem;color:var(--primary)}
.nav-row{display:flex;justify-content:space-between;gap:1rem;margin-top:.8rem}
.nbtn{flex:1;padding:.8rem 1rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .18s}
#btn-next{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(108,63,197,.3)}
#btn-next:hover{background:var(--pl);transform:translateY(-2px)}
#btn-next:disabled{opacity:.4;cursor:default;transform:none}
#btn-home{background:transparent;color:var(--muted);border:2px solid rgba(108,63,197,.2)}
#btn-home:hover{border-color:var(--primary);color:var(--primary)}
#result-screen{display:none;max-width:550px;margin:2rem auto;padding:0 1.2rem;text-align:center;animation:fu .4s}
.rcard{background:var(--card);border-radius:var(--r);padding:2rem 1.5rem;box-shadow:var(--shadow);border:2px solid rgba(108,63,197,.1)}
.remoji{font-size:3rem;display:block;margin-bottom:.6rem}
.rcard h2{font-family:'Baloo 2',cursive;font-size:1.6rem;color:var(--primary);margin-bottom:.3rem}
.rscore{font-size:2.5rem;font-weight:900;color:var(--accent);line-height:1;margin:.5rem 0}
.rcard p{color:var(--muted);font-size:.92rem;margin-bottom:1rem}
.rbtns{display:flex;flex-direction:column;gap:.6rem}
.rbtns button{padding:.8rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .18s}
.bp{background:var(--primary);color:#fff}.bp:hover{background:var(--pl)}
.bs{background:transparent;border:2px solid rgba(108,63,197,.25)!important;color:var(--muted)}.bs:hover{border-color:var(--primary)!important;color:var(--primary)}
.larev{margin-top:1rem;text-align:left}
.larev h3{font-family:'Baloo 2',cursive;color:var(--primary);margin-bottom:.8rem;font-size:1.05rem}
.lai{background:#faf8ff;border:1.5px solid rgba(108,63,197,.12);border-radius:12px;padding:1rem;margin-bottom:.8rem;font-size:.85rem;line-height:1.6}
.lai .lq{font-weight:700;color:var(--text);margin-bottom:.3rem}
.lai .la{color:var(--primary)}
.lai .ls{color:var(--muted);font-style:italic;margin-top:.3rem;font-size:.8rem}
.blink{text-align:center;margin-top:1rem}
.blink button{background:transparent;color:var(--muted);border:2px solid rgba(108,63,197,.2);border-radius:12px;padding:.6rem 1.2rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer}
.blink button:hover{border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<header><h1>🇬🇧 English Practice</h1><p>Pratique d'anglais · Grades 3 & 4</p></header>

<div id="level-screen" class="screen">
<h2>Choisis ton niveau / Choose your level</h2>
<div class="level-grid">
<button class="level-btn" onclick="selectLevel('beginner')"><span class="li">🌱</span><div><div class="lt">Débutant / Beginner</div><div class="ld">Vocabulaire, noms, verbes, adjectifs, phrases simples.</div></div></button>
<button class="level-btn" onclick="selectLevel('intermediate')"><span class="li">📚</span><div><div class="lt">Intermédiaire / Intermediate</div><div class="ld">Nouns, verbs, adjectives, reading with short answers.</div></div></button>
<button class="level-btn" onclick="selectLevel('advanced')"><span class="li">🏆</span><div><div class="lt">Advanced / Avancé</div><div class="ld">Grammar, nouns/verbs/adjectives, reading comprehension with long written answers.</div></div></button>
</div></div>

<div id="category-screen" class="screen" style="display:none">
<h2 id="cat-title">Choose a section</h2>
<div class="cat-grid" id="cat-grid"></div>
<div class="blink"><button onclick="goLevelSelect()">← Change level</button></div>
</div>

<div id="game-screen">
<div class="pbar"><div class="pfill" id="pfill"></div></div>
<div class="hud"><span id="qctr">Question 1 / 20</span><span class="sc">⭐ <span id="scr">0</span></span></div>
<div class="qcard">
<div class="qlbl" id="qcat"></div>
<div class="qtxt" id="qtxt"></div>
<div class="qhint" id="qhint" style="display:none"></div>
<div class="passage" id="qpass" style="display:none"></div>
<div class="awrap" id="awrap"><input type="text" class="ainput" id="ainp" placeholder="Your answer..." autocomplete="off"><button class="sbtn" id="sbtn" onclick="check()">OK</button></div>
</div>
<div class="fb" id="fb"></div>
<div class="corr" id="corr"></div>
<div class="nav-row"><button class="nbtn" id="btn-home" onclick="goCats()">🏠 Menu</button><button class="nbtn" id="btn-next" onclick="next()" disabled>Next →</button></div>
</div>

<div id="result-screen">
<div class="rcard">
<span class="remoji" id="remoji">🎉</span><h2 id="rtitle">Done!</h2>
<div class="rscore" id="rscore"></div><p id="rmsg"></p>
<div class="larev" id="larev" style="display:none"></div>
<div class="rbtns"><button class="bp" onclick="startGame(lastCat)">🔄 Replay</button><button class="bs" onclick="goCats()">🏠 Menu</button></div>
</div></div>

function pk(a,n){return sh([...a]).slice(0,Math.min(n,a.length));}
function nr(s){return s.toLowerCase().trim().replace(/['']/g,"'").replace(/[.,!?;:]/g,'').replace(/\s+/g,' ');}

function bRQ(arr,incL){const qs=[];sh([...arr]).forEach(r=>{r.q.forEach(q=>{const tp=q.tp==='written'?'written':'short';qs.push({text:q.t,correct:q.c,altCorrect:q.a,passage:r.p,category:'📚 Reading',type:tp});});if(incL&&r.lq)r.lq.forEach(q=>qs.push({text:q.t,sampleAnswer:q.s,passage:r.p,category:'✍️ Writing',type:'long'}));});return qs;}

function fmt(arr,cat){return arr.map(q=>({text:q.t,correct:q.c,altCorrect:q.a,hint:q.h,category:cat}));}

// Generate MC choices for beginner questions
function addMC(qs,allAnswers){
  return qs.map((q,i)=>{
    // ~65% chance of MC for beginner
    if(Math.random()<0.65 && q.correct){
      const c=q.correct;
      // If the answer is noun/verb/adjective, ALWAYS show as MC with all 3 options
      if(['noun','verb','adjective'].includes(nr(c))){
        return {...q,type:'mc',choices:sh(['noun','verb','adjective'])};
      }
      // Get 3 wrong answers from pool
      const wrongs=allAnswers.filter(a=>nr(a)!==nr(c) && !['noun','verb','adjective'].includes(nr(a)));
      sh(wrongs);
      const choices=sh([c,wrongs[0]||'---',wrongs[1]||'---',wrongs[2]||'---']);
      return {...q,type:'mc',choices};
    }
    // Even if not in the 65%, still force MC for noun/verb/adjective questions
    if(['noun','verb','adjective'].includes(nr(q.correct))){
      return {...q,type:'mc',choices:sh(['noun','verb','adjective'])};
    }
    return q;
  });
}

const wc=ua.split(/\s+/).filter(w=>w.length>0).length;
laLog.push({question:q.text,answer:ua,sampleAnswer:q.sampleAnswer||''});
if(wc>=15){score++;inp.className='ainput ok';fb.textContent='✅ Great answer! Your teacher will review it.';fb.className='fb ok';}
else{inp.className='ainput err';fb.textContent='⚠️ Try to write more! At least 4 full sentences.';fb.className='fb rev';}
const co=document.getElementById('corr');co.innerHTML=`<strong>Sample answer:</strong><br>${q.sampleAnswer}<div class="tnote">📋 Your teacher will also review your answer.</div>`;co.style.display='block';
}else if(q.type==='written'){
// Written short answer — check keywords but also save for review
const cn=nr(q.correct),all=[cn];if(q.altCorrect)q.altCorrect.forEach(x=>all.push(nr(x)));
const wc=ua.split(/\s+/).filter(w=>w.length>0).length;
const hasKeyword=all.some(c=>nr(ua).includes(c));
if(hasKeyword&&wc>=3){score++;inp.className='ainput ok';fb.textContent='✅ Correct!';fb.className='fb ok';}
else if(hasKeyword){inp.className='ainput ok';fb.textContent='✅ Correct! But try to write a full sentence next time.';fb.className='fb ok';score++;}
else{inp.className='ainput err';fb.textContent='❌ Not quite right.';fb.className='fb err';
const co=document.getElementById('corr');co.innerHTML=`<strong>Correct answer:</strong> ${q.correct}`;co.style.display='block';}
}else{
const cn=nr(q.correct),all=[cn];if(q.altCorrect)q.altCorrect.forEach(x=>all.push(nr(x)));
if(all.some(c=>nr(ua)===c)){score++;inp.className='ainput ok';fb.textContent=fr?'✅ Bravo ! Bonne réponse !':'✅ Correct!';fb.className='fb ok';}
else{inp.className='ainput err';fb.textContent=fr?'❌ Ce n\'est pas la bonne réponse.':'❌ Not quite right.';fb.className='fb err';
const co=document.getElementById('corr');co.innerHTML=`<strong>${fr?'La bonne réponse':'Correct answer'}:</strong> ${q.correct}`;co.style.display='block';}
}
document.getElementById('scr').textContent=score;document.getElementById('btn-next').disabled=false;
if(current===questions.length-1)document.getElementById('btn-next').textContent=fr?'Voir les résultats 🎉':'See results 🎉';
}

document.addEventListener('keydown',e=>{const q=questions[current];if(e.key==='Enter'&&!(q&&(q.type==='long'||q.type==='written'))&&q.type!=='mc'){if(!answered)check();else if(!document.getElementById('btn-next').disabled)next();}});

function next(){current++;if(current>=questions.length)showRes();else showQ();}

function showRes(){
document.getElementById('game-screen').style.display='none';
const rs=document.getElementById('result-screen');rs.style.display='block';
const tot=questions.length,pct=Math.round((score/tot)*100);
document.getElementById('rscore').textContent=`${score} / ${tot}`;
const fr=currentLevel==='beginner';let e,m;
if(pct===100){e='🏆';m=fr?'Score parfait !':'Perfect score!';}
else if(pct>=80){e='🌟';m=fr?'Excellent !':'Excellent!';}
else if(pct>=60){e='😊';m=fr?'Bon travail !':'Good job!';}
else if(pct>=40){e='💪';m=fr?'Continue !':'Keep going!';}
else{e='📚';m=fr?'La pratique rend parfait !':'Practice makes perfect!';}
document.getElementById('remoji').textContent=e;document.getElementById('rmsg').textContent=m;
try{window.parent.postMessage({type:'gameScore',score:score,total:tot,pct:pct},'*');}catch(e){}
document.getElementById('rtitle').textContent=fr?'Terminé !':'Done!';
const la=document.getElementById('larev');
if(laLog.length>0){let h='<h3>📋 Long Answers — For teacher review:</h3>';
laLog.forEach((l,i)=>{h+=`<div class="lai"><div class="lq">${i+1}. ${l.question}</div><div class="la"><strong>Student wrote:</strong> ${l.answer}</div><div class="ls"><strong>Sample answer:</strong> ${l.sampleAnswer}</div></div>`;});
la.innerHTML=h;la.style.display='block';}else la.style.display='none';
}

function goCats(){document.getElementById('game-screen').style.display='none';document.getElementById('result-screen').style.display='none';document.getElementById('category-screen').style.display='block';}
function goLevelSelect(){document.getElementById('category-screen').style.display='none';document.getElementById('game-screen').style.display='none';document.getElementById('result-screen').style.display='none';document.getElementById('level-screen').style.display='block';}
</script>
</body>
